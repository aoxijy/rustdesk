name: Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.4.8-custom)'
        required: true
        default: 'v1.4.8-custom'
      prerelease:
        description: 'Prerelease'
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:

  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install prerequisites
        run: |
          sudo apt-get -y update
          sudo apt-get install -y \
            clang cmake curl gcc git g++ \
            libpam0g-dev libasound2-dev libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgtk-3-dev libpulse-dev libva-dev libvdpau-dev \
            libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxdo-dev libxfixes-dev nasm wget
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
      - name: Install vcpkg dependencies
        run: $VCPKG_ROOT/vcpkg install --x-install-root="$VCPKG_ROOT/installed"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --locked --release --target=x86_64-unknown-linux-gnu
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-amd64
          path: target/x86_64-unknown-linux-gnu/release/rustdesk
          if-no-files-found: warn

  build-windows:
    name: Windows x86_64
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: D:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
      - name: Install vcpkg dependencies
        run: |
          vcpkg install --x-install-root="${env:VCPKG_ROOT}\installed"
        shell: pwsh
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --locked --release --target=x86_64-pc-windows-msvc
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-amd64
          path: target/x86_64-pc-windows-msvc/release/rustdesk.exe
          if-no-files-found: warn

  build-macos:
    name: macOS x86_64
    runs-on: macos-12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --locked --release --target=x86_64-apple-darwin
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-macos-amd64
          path: target/x86_64-apple-darwin/release/rustdesk
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Prepare release files
        run: |
          mkdir release-files
          cp rustdesk-linux-amd64/rustdesk release-files/rustdesk-linux-amd64
          cp rustdesk-windows-amd64/rustdesk.exe release-files/rustdesk-windows-amd64.exe
          cp rustdesk-macos-amd64/rustdesk release-files/rustdesk-macos-amd64
          cd release-files
          sha256sum * > SHA256SUMS.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "RustDesk Custom Build ${{ inputs.tag }}"
          body: |
            ## RustDesk 自定义编译版

            **默认服务器配置：**
            - ID/中继服务器: `hhc.gqru.com`
            - API 服务器: `http://hhc.gqru.com:8585`

            请根据你的平台下载对应文件。
          draft: false
          prerelease: ${{ inputs.prerelease }}
          files: |
            release-files/*

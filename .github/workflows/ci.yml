name: CI

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    name: ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: x86_64-apple-darwin         , os: macos-12                  }
          - { target: x86_64-pc-windows-msvc      , os: windows-2022                  }
          - { target: x86_64-unknown-linux-gnu    , os: ubuntu-24.04                  }
    steps:
    - name: Free Disk Space (Ubuntu)
      if: runner.os == 'Linux'
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: false
        docker-images: true
        swap-storage: false

    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Checkout source code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        submodules: recursive

    - name: Install prerequisites
      shell: bash
      run: |
        case ${{ matrix.job.target }} in
          x86_64-unknown-linux-gnu)
            sudo apt-get -y update
            sudo apt-get install -y \
               clang cmake curl gcc git g++ libpam0g-dev libasound2-dev \
               libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
               libgtk-3-dev libpulse-dev libva-dev libvdpau-dev \
               libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
               libxdo-dev libxfixes-dev nasm wget
            ;;
        esac

    - name: Setup vcpkg with Github Actions binary cache
      if: runner.os == 'Linux'
      uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2
      with:
        vcpkgDirectory: /opt/artifacts/vcpkg
        vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

    - name: Install vcpkg dependencies
      if: runner.os == 'Linux'
      run: $VCPKG_ROOT/vcpkg install --x-install-root="$VCPKG_ROOT/installed"
      shell: bash

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
      with:
        toolchain: stable
        targets: ${{ matrix.job.target }}

    - name: Show version information
      shell: bash
      run: |
        gcc --version || true
        rustup -V
        cargo -V
        rustc -V

    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

    - name: Build release
      uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505
      with:
        use-cross: ${{ matrix.job.use-cross }}
        command: build
        args: --release --locked --target=${{ matrix.job.target }}

    - name: Prepare artifact
      shell: bash
      run: |
        EXE_suffix=""
        [ "${{ matrix.job.target }}" = "x86_64-pc-windows-msvc" ] && EXE_suffix=".exe"
        cp "target/${{ matrix.job.target }}/release/rustdesk${EXE_suffix}" .
        case ${{ matrix.job.target }} in
          x86_64-unknown-linux-gnu) strip -s rustdesk ;;
          x86_64-apple-darwin) strip rustdesk 2>/dev/null || true ;;
        esac

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-${{ matrix.job.target }}
        path: rustdesk*